# Cloudflare Worker Configuration for WhatsApp Notifier (Green API)
# https://developers.cloudflare.com/workers/wrangler/configuration/

name = "whatsapp-notifier"
main = "src/worker.js"
compatibility_date = "2024-01-01"

# Environment variables (set via wrangler secret or --var flag)
# DO NOT commit actual secrets to version control!
[vars]
# GREEN_API_ID = "7107560335"              # Set via: wrangler secret put GREEN_API_ID
# GREEN_API_TOKEN = "your_token_here"     # Set via: wrangler secret put GREEN_API_TOKEN
# GREEN_API_URL = "https://7107.api.greenapi.com"  # Set via: wrangler secret put GREEN_API_URL
# USER_WHATSAPP_NUMBER = "1234567890@c.us"         # Set via: wrangler secret put USER_WHATSAPP_NUMBER
# COPAW_WEBHOOK_URL = "https://..."       # Set via: wrangler secret put COPAW_WEBHOOK_URL

# Development settings
[dev]
port = 8787
local_protocol = "http"

# Build settings
[build]
command = ""

# Minification for production
minify = true

# Secrets (set via wrangler secret put):
# - GREEN_API_ID: Green API instance ID (e.g., "7107560335")
# - GREEN_API_TOKEN: Green API token instance
# - GREEN_API_URL: Green API base URL (e.g., "https://7107.api.greenapi.com")
# - USER_WHATSAPP_NUMBER: Recipient WhatsApp number (e.g., "1234567890@c.us")
# - COPAW_WEBHOOK_URL: CoPaw webhook receiver URL (for inbound responses)
