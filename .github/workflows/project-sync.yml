name: BiOS Project Sync

on:
  issues:
    types: [opened, edited, deleted, closed, reopened, labeled, unlabeled]
  pull_request:
    types: [opened, closed, reopened, labeled, unlabeled]

jobs:
  sync_project:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to BiOS Project Board
        uses: actions/add-to-project@v0.5.0
        with:
          project-url: https://github.com/users/danxalot/projects/1
          github-token: ${{ secrets.BIOS_PROJECT_PAT }}
